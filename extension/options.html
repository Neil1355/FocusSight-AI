<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FocusSight AI – Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f8;
      color: #2c3e50;
      max-width: 480px;
      margin: 40px auto;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a2e;
    }
    .subtitle { font-size: 13px; color: #7f8c8d; margin-bottom: 28px; }

    .field { margin-bottom: 20px; }
    label  { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .hint  { font-size: 11px; color: #95a5a6; margin-top: 4px; }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #dde3eb;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #2c3e50;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus { border-color: #3498db; }

    button {
      background: #2980b9;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1f6fa0; }

    #status-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #27ae60;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>FocusSight AI</h1>
  <p class="subtitle">Extension settings — changes take effect immediately.</p>

  <div class="field">
    <label for="server-url">API Server URL</label>
    <input type="text" id="server-url" placeholder="http://127.0.0.1:8765" />
    <p class="hint">The URL of your local FocusSight API server started with <code>--serve</code>.</p>
  </div>

  <div class="field">
    <label for="notif-style">Notification Style</label>
    <select id="notif-style">
      <option value="banner">Banner (desktop notification)</option>
      <option value="silent">Silent (badge only)</option>
      <option value="none">None</option>
    </select>
  </div>

  <div class="field">
    <label for="dist-threshold">Distraction Alert Threshold (seconds)</label>
    <input type="number" id="dist-threshold" min="1" max="120" step="1" value="5" />
    <p class="hint">Notify after this many continuous seconds of distraction.</p>
  </div>

  <button id="save-btn">Save Settings</button>
  <p id="status-msg"></p>

  <script src="options.js"></script>
</body>
</html>
