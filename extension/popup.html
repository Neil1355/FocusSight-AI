<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusSight AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      width: 280px;
      min-height: 300px;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    header img { width: 32px; height: 32px; border-radius: 6px; }
    header h1 { font-size: 15px; font-weight: 600; color: #fff; }

    /* State badge */
    #state-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 14px;
      transition: background 0.3s;
    }
    .badge-focused    { background: #27ae60; color: #fff; }
    .badge-distracted { background: #e74c3c; color: #fff; }
    .badge-unknown    { background: #f39c12; color: #fff; }
    .badge-offline    { background: #7f8c8d; color: #fff; }

    /* Stat grid */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: #16213e;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .stat-label { font-size: 10px; color: #8899aa; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-value { font-size: 18px; font-weight: 700; color: #fff; margin-top: 2px; }

    /* Progress bar */
    .bar-wrap {
      background: #16213e;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      background: #27ae60;
      transition: width 0.5s ease, background 0.3s;
    }

    /* Signal status */
    #signal-row {
      font-size: 11px;
      color: #8899aa;
      margin-bottom: 12px;
    }
    #signal-row span { color: #c0cfe0; font-weight: 600; }

    /* Footer */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: #5a6a7a;
    }
    footer a { color: #5a6a7a; text-decoration: none; }
    footer a:hover { color: #8899aa; }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      background: #7f8c8d;
    }
    .dot.live { background: #27ae60; animation: pulse 1.4s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="FocusSight" />
    <h1>FocusSight AI</h1>
  </header>

  <div id="state-badge" class="badge-offline">Connecting…</div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Focus</div>
      <div class="stat-value" id="focus-pct">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Distracted</div>
      <div class="stat-value" id="dist-pct">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="streak">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Elapsed</div>
      <div class="stat-value" id="elapsed">–</div>
    </div>
  </div>

  <div class="bar-wrap">
    <div class="bar-fill" id="focus-bar" style="width:0%"></div>
  </div>

  <div id="signal-row">Signal: <span id="signal-status">–</span></div>

  <footer>
    <div><span class="dot" id="live-dot"></span><span id="live-label">Offline</span></div>
    <a href="#" id="options-link">Options</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
